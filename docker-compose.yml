version: '3.8'

# ================================================================
# NETWORKS - Like virtual switches connecting containers
# ================================================================

networks:
  # PUBLIC NETWORK: For external traffic (exposed to internet)
  web_network:
    driver: bridge
    name: web_network
  
  # INTERNAL NETWORK: For sensitive data (NO external access)
  # THIS IS THE SECURITY FEATURE - internal: true blocks all external traffic
  secure_network:
    driver: bridge
    internal: true              # CRITICAL: Blocks ALL external access
    name: secure_network

# ================================================================
# VOLUMES - Persistent storage that survives container restarts
# ================================================================

volumes:
  database_data:
    name: database_data
  cache_data:
    name: cache_data

# ================================================================
# SERVICES - Each service runs in its own container
# ================================================================

services:
  # --------------------------------------------------------------
  # SERVICE 1: WORKER (Your Python Application)
  # --------------------------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    
    container_name: worker_service
    
    # Environment variables passed to the container
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=myapp_user
      - DB_PASSWORD=secure_password_here
      - DB_NAME=myapp
      - CACHE_HOST=cache
      - CACHE_PORT=6379
      - CACHE_PASSWORD=secure_cache_password_here
      - API_PORT=8080
      - DEBUG=False
    
    # Port mapping: Host Port : Container Port
    # This exposes your API at http://localhost:8080
    ports:
      - "8080:8080"
    
    # CRITICAL: Worker connects to BOTH networks
    # It's the bridge between public and internal networks
    networks:
      - web_network              # For external HTTP requests
      - secure_network           # For internal DB/Cache communication
    
    restart: unless-stopped
    
    # Wait for database and cache to start first
    depends_on:
      - database
      - cache
    
    # Mount logs directory for persistent logs
    volumes:
      - ./logs:/var/log/app:rw
    
    # Health check to verify service is running
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health', timeout=2)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --------------------------------------------------------------
  # SERVICE 2: DATABASE (PostgreSQL - Data Storage)
  # --------------------------------------------------------------
  database:
    image: postgres:15-alpine
    container_name: database_service
    
    environment:
      - POSTGRES_DB=myapp
      - POSTGRES_USER=myapp_user
      - POSTGRES_PASSWORD=secure_password_here
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    
    # CRITICAL: Database ONLY on internal network
    # This prevents ANY external access to your data
    networks:
      - secure_network
    
    # Persistent storage for database files
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp_user -d myapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------
  # SERVICE 3: CACHE (Redis - Fast In-Memory Storage)
  # --------------------------------------------------------------
  cache:
    image: redis:7-alpine
    container_name: cache_service
    
    # CRITICAL: Cache ONLY on internal network
    networks:
      - secure_network
    
    # Persistent storage for cache
    volumes:
      - cache_data:/data
    
    # Redis configuration: password + persistence
    command: redis-server --requirepass secure_cache_password_here --appendonly yes
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
